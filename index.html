    <!-- Dynamic 120fps Canvas Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">

        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface/80 backdrop-blur-[1px]"></div>

    <script>
        // ============================================
        // 120FPS Network Particle Background
        // ============================================
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            let width, height;
            let particles = [];
            const connectionDistance = 180;
            const mouse = { x: null, y: null, radius: 250 };

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
            }

            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8;
                    this.baseRadius = Math.random() * 2 + 1;
                    this.radius = this.baseRadius;
                    const colors = ['#2563eb', '#007d55', '#004ac6'];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                    this.x += this.vx;
                    this.y += this.vy;

                    if (mouse.x != null) {
                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            const force = (mouse.radius - distance) / mouse.radius;
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            this.x -= forceDirectionX * force * 1.5;
                            this.y -= forceDirectionY * force * 1.5;
                            this.radius = this.baseRadius + (force * 3);
                        } else {
                            this.radius = this.baseRadius;
                        }
                    } else {
                        this.radius = this.baseRadius;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                const particleCount = Math.min(Math.floor((width * height) / 9000), 150);
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            initParticles();

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(initParticles, 200);
            });

            function animate() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();

                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            const opacity = 1 - (dist / connectionDistance);
                            ctx.strokeStyle = `rgba(37, 99, 235, ${opacity * 0.25})`;
                            ctx.lineWidth = 1;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
        })();

        // ============================================
        // Supabase Init (inline)
        // ============================================
        const SUPABASE_URL = 'https://gaattdmfuyxnaofspfvy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYXR0ZG1mdXl4bmFvZnNwZnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDUxOTYsImV4cCI6MjA5MTg4MTE5Nn0.IOb6H2BofMFr14S-fjV8AANSNef-3zlEwRfenbNES10';

        let _supabase;

        } catch (err) {

        // ============================================
        // Toast
        // ============================================
        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            requestAnimationFrame(function() { toast.classList.add('show'); });
            setTimeout(function() { toast.classList.remove('show'); }, 3500);
        }

        // ============================================
        // Loading
        // ============================================
        function setLoading(loading) {
            var text = document.getElementById('btn-login-text');
            var spinner = document.getElementById('btn-login-spinner');
            var btn = document.getElementById('btn-login');
            if (loading) {
                text.textContent = 'Đang xử lý...';
                text.classList.add('opacity-50');
                spinner.classList.remove('hidden');
                btn.disabled = true;
            } else {
                text.textContent = 'Đăng nhập';
                text.classList.remove('opacity-50');
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // ============================================
        // Email Login
        // ============================================
        async function loginWithEmail() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Vui lòng nhập đầy đủ email và mật khẩu!', 'error');
                return;
            }

            setLoading(true);

            try {
                var result = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                setLoading(false);

                if (result.error) {
                    console.error('Login error:', result.error);
                    if (result.error.message.includes('Invalid login credentials')) {
                        showToast('Email hoặc mật khẩu không đúng!', 'error');
                    } else if (result.error.message.includes('Email not confirmed')) {
                        showToast('Vui lòng xác nhận email trước khi đăng nhập!', 'error');
                    } else {
                        showToast('Lỗi: ' + result.error.message, 'error');
                    }
                    return;
                }

                console.log('✅ Login success:', result.data.user.email);
                showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                setTimeout(function() {
                    window.location.href = 'dashboard/dashboard.html';
                }, 1000);

            } catch (err) {
                setLoading(false);
                console.error('Unexpected error:', err);
                showToast('Lỗi không xác định! Vui lòng thử lại.', 'error');
            }
        }

        // ============================================
        // GitHub Login
        // ============================================
        async function loginWithGithub() {
            try {
                var result = await _supabase.auth.signInWithOAuth({
                    provider: 'github',
                    options: {
                        redirectTo: window.location.origin + '/dashboard/dashboard.html'
                    }
                });
                if (result.error) {
                    showToast('Lỗi đăng nhập GitHub: ' + result.error.message, 'error');
                }
            } catch (err) {
                console.error('GitHub login error:', err);
                showToast('Lỗi kết nối GitHub!', 'error');
            }
        }

        // ============================================
        // Form Submit Handler
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('login-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('📝 Login form submitted');
                    loginWithEmail();
                });
                console.log('✅ Login form listener attached');
            }

            // Check if already logged in
            (async function() {
                try {
                    var result = await _supabase.auth.getUser();
                    if (result.data && result.data.user) {
                        console.log('Already logged in, redirecting...');
                        window.location.href = 'dashboard/dashboard.html';
                    }
                } catch (err) {
                    console.log('Not logged in');
                }
            })();
        });
    </script>
