<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary/20 relative">

    <main class="w-full max-w-[480px] flex flex-col items-center animate-fade-in-up relative z-10">

            <h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-3 leading-tight">

            <p class="text-on-surface-variant text-lg max-w-sm mx-auto leading-relaxed">

        <!-- Register Card -->
        <div class="w-full glass-card p-8 md:p-10 rounded-2xl transition-all duration-500 hover:shadow-[0_40px_80px_rgba(0,0,0,0.08)]">

    <!-- Dynamic 120fps Canvas Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <canvas id="bg-canvas" class="absolute inset-0 w-full h-full"></canvas>
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface/80 backdrop-blur-[1px]"></div>
    </div>

    <script>
        // ============================================
        // 120FPS Network Particle Background
        // ============================================
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            let width, height;
            let particles = [];
            const connectionDistance = 180;
            const mouse = { x: null, y: null, radius: 250 };

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
            }

            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8;
                    this.baseRadius = Math.random() * 2 + 1;
                    this.radius = this.baseRadius;
                    const colors = ['#2563eb', '#007d55', '#004ac6'];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                    this.x += this.vx;
                    this.y += this.vy;

                    if (mouse.x != null) {
                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            const force = (mouse.radius - distance) / mouse.radius;
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            this.x -= forceDirectionX * force * 1.5;
                            this.y -= forceDirectionY * force * 1.5;
                            this.radius = this.baseRadius + (force * 3);
                        } else {
                            this.radius = this.baseRadius;
                        }
                    } else {
                        this.radius = this.baseRadius;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                const particleCount = Math.min(Math.floor((width * height) / 9000), 150);
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            initParticles();

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(initParticles, 200);
            });

            function animate() {
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();

                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            ctx.beginPath();
                            const opacity = 1 - (dist / connectionDistance);
                            ctx.strokeStyle = `rgba(37, 99, 235, ${opacity * 0.25})`;
                            ctx.lineWidth = 1;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
        })();

        // ============================================
        // Supabase Init (inline - không phụ thuộc file ngoài)
        // ============================================
        const SUPABASE_URL = 'https://gaattdmfuyxnaofspfvy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYXR0ZG1mdXl4bmFvZnNwZnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDUxOTYsImV4cCI6MjA5MTg4MTE5Nn0.IOb6H2BofMFr14S-fjV8AANSNef-3zlEwRfenbNES10';

        let _supabase;
        try {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase connected successfully');
        } catch (err) {
            console.error('❌ Supabase init failed:', err);
            alert('Lỗi kết nối Supabase! Vui lòng kiểm tra kết nối mạng.');
        }

        // ============================================
        // Toast Notification
        // ============================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            requestAnimationFrame(function() { toast.classList.add('show'); });
            setTimeout(function() { toast.classList.remove('show'); }, 3500);
        }

        // ============================================
        // Loading State
        // ============================================
        function setLoading(loading) {
            var text = document.getElementById('btn-signup-text');
            var spinner = document.getElementById('btn-signup-spinner');
            var btn = document.getElementById('btn-signup');
            if (loading) {
                text.textContent = 'Đang xử lý...';
                text.classList.add('opacity-50');
                spinner.classList.remove('hidden');
                btn.disabled = true;
            } else {
                text.textContent = 'Đăng ký';
                text.classList.remove('opacity-50');
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // ============================================
        // Email/Password Signup
        // ============================================
        async function signupWithEmail() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            // Validate
            if (!email || !password || !confirmPassword) {
                showToast('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            setLoading(true);

            try {
                var result = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                });

                setLoading(false);

                if (result.error) {
                    console.error('Signup error:', result.error);
                    if (result.error.message.includes('already registered')) {
                        showToast('Email này đã được đăng ký! Hãy đăng nhập.', 'error');
                    } else if (result.error.message.includes('valid email')) {
                        showToast('Email không hợp lệ!', 'error');
                    } else {
                        showToast('Lỗi: ' + result.error.message, 'error');
                    }
                    return;
                }

                // Check if user already exists (Supabase returns user with empty identities)
                if (result.data && result.data.user && result.data.user.identities && result.data.user.identities.length === 0) {
                    showToast('Email này đã được đăng ký! Hãy đăng nhập.', 'error');
                    return;
                }

                console.log('✅ Signup success:', result.data);
                showToast('🎉 Đăng ký thành công! Kiểm tra email để xác nhận.', 'success');

                // Redirect to login after 2.5 seconds
                setTimeout(function() {
                    window.location.href = '../index.html';
                }, 2500);

            } catch (err) {
                setLoading(false);
                console.error('Unexpected error:', err);
                showToast('Lỗi không xác định! Vui lòng thử lại.', 'error');
            }
        }

        // ============================================
        // Form Submit Handler (using addEventListener)
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('signup-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('📝 Form submitted');
                    signupWithEmail();
                });
                console.log('✅ Form listener attached');
            } else {
                console.error('❌ Form not found!');
            }

            // Also attach click handler to button as backup
            var btn = document.getElementById('btn-signup');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    // Only handle if form submit didn't fire
                    // This is a backup handler
                    console.log('🔘 Button clicked');
                });
            }
        });
    </script>
