<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đăng ký - Personal Task Kanban</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eceef0",
                        "tertiary-container": "#007d55",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed": "#d3e4fe",
                        "on-tertiary-fixed": "#002113",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary-fixed": "#00174b",
                        "on-surface-variant": "#434655",
                        "secondary": "#505f76",
                        "on-background": "#191c1e",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline-variant": "#c3c6d7",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "inverse-primary": "#b4c5ff",
                        "primary-container": "#2563eb",
                        "on-secondary-container": "#54647a",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#bdffdb",
                        "on-surface": "#191c1e",
                        "surface-bright": "#f7f9fb",
                        "secondary-container": "#d0e1fb",
                        "error-container": "#ffdad6",
                        "primary": "#004ac6",
                        "surface": "#f7f9fb",
                        "surface-tint": "#0053db",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-fixed-variant": "#005236",
                        "background": "#f7f9fb",
                        "on-primary-container": "#eeefff",
                        "surface-container-low": "#f2f4f6",
                        "surface-dim": "#d8dadc",
                        "on-secondary-fixed-variant": "#38485d",
                        "outline": "#737686",
                        "surface-variant": "#e0e3e5",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "tertiary": "#006242",
                        "tertiary-fixed": "#6ffbbe",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="../style/style.css"/>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary/20">

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <main class="w-full max-w-[480px] flex flex-col items-center">
        <!-- Logo & Branding -->
        <div class="mb-12 text-center">
            <div class="inline-flex items-center justify-center p-4 bg-primary-fixed-dim/20 rounded-xl mb-6">
                <span class="material-symbols-outlined text-primary text-4xl">view_kanban</span>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-3 leading-tight">
                Tạo tài khoản mới
            </h1>
            <p class="text-on-surface-variant text-lg max-w-sm mx-auto leading-relaxed">
                Đăng ký để bắt đầu quản lý công việc hiệu quả với Personal Task Kanban.
            </p>
        </div>

        <!-- Register Card -->
        <div class="w-full bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0px_12px_32px_rgba(25,28,30,0.04)] border border-outline-variant/10">
            <div class="space-y-6">
                <!-- Google Signup -->
                <button id="btn-google" onclick="signupWithGoogle()" class="w-full flex items-center justify-center gap-4 bg-surface-container-lowest border border-outline-variant py-4 px-6 rounded-lg hover:bg-surface-container-low transition-all duration-200 group active:scale-[0.98]">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                    </svg>
                    <span class="text-on-surface font-semibold text-lg">Đăng ký bằng Google</span>
                </button>

                <!-- Separator -->
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                    <span class="flex-shrink mx-4 text-on-surface-variant text-xs font-bold tracking-widest uppercase">Hoặc sử dụng email</span>
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                </div>

                <!-- Email/Password Signup -->
                <form id="signup-form" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold tracking-wider uppercase text-on-surface-variant ml-1">Email</label>
                        <input id="email" class="w-full bg-surface-container-low border-0 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all" placeholder="example@email.com" type="email" required/>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold tracking-wider uppercase text-on-surface-variant ml-1">Mật khẩu</label>
                        <input id="password" class="w-full bg-surface-container-low border-0 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all" placeholder="Tối thiểu 6 ký tự" type="password" required minlength="6"/>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold tracking-wider uppercase text-on-surface-variant ml-1">Xác nhận mật khẩu</label>
                        <input id="confirm-password" class="w-full bg-surface-container-low border-0 rounded-lg py-3 px-4 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all" placeholder="Nhập lại mật khẩu" type="password" required minlength="6"/>
                    </div>
                    <button id="btn-signup" type="submit" class="w-full bg-primary text-on-primary py-4 px-6 rounded-sm font-bold text-base hover:bg-primary-container transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2">
                        <span id="btn-signup-text">Đăng ký</span>
                        <div id="btn-signup-spinner" class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <!-- Footer Links -->
            <div class="mt-10 flex flex-col items-center gap-4 text-sm">
                <p class="text-on-surface-variant">
                    Đã có tài khoản?
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="../index.html">Đăng nhập ngay</a>
                </p>
            </div>
        </div>

        <!-- Aesthetic Footer -->
        <div class="mt-16 grid grid-cols-3 gap-8 w-full">
            <div class="flex flex-col items-center text-center">
                <span class="material-symbols-outlined text-secondary text-2xl mb-2">security</span>
                <span class="text-[10px] font-bold tracking-tighter uppercase text-on-surface-variant">Bảo mật SSL</span>
            </div>
            <div class="flex flex-col items-center text-center">
                <span class="material-symbols-outlined text-secondary text-2xl mb-2">cloud_sync</span>
                <span class="text-[10px] font-bold tracking-tighter uppercase text-on-surface-variant">Đồng bộ đám mây</span>
            </div>
            <div class="flex flex-col items-center text-center">
                <span class="material-symbols-outlined text-secondary text-2xl mb-2">devices</span>
                <span class="text-[10px] font-bold tracking-tighter uppercase text-on-surface-variant">Đa nền tảng</span>
            </div>
        </div>
    </main>

    <!-- Background Decoration -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed-dim/10 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] rounded-full bg-tertiary-fixed-dim/5 blur-[100px]"></div>
        <div class="absolute top-[20%] right-[5%] w-[20%] h-[20%] rounded-full bg-secondary-fixed/5 blur-[80px]"></div>
    </div>

    <script>
        // ============================================
        // Supabase Init (inline - không phụ thuộc file ngoài)
        // ============================================
        const SUPABASE_URL = 'https://gaattdmfuyxnaofspfvy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYXR0ZG1mdXl4bmFvZnNwZnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDUxOTYsImV4cCI6MjA5MTg4MTE5Nn0.IOb6H2BofMFr14S-fjV8AANSNef-3zlEwRfenbNES10';

        let _supabase;
        try {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase connected successfully');
        } catch (err) {
            console.error('❌ Supabase init failed:', err);
            alert('Lỗi kết nối Supabase! Vui lòng kiểm tra kết nối mạng.');
        }

        // ============================================
        // Toast Notification
        // ============================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            requestAnimationFrame(function() { toast.classList.add('show'); });
            setTimeout(function() { toast.classList.remove('show'); }, 3500);
        }

        // ============================================
        // Loading State
        // ============================================
        function setLoading(loading) {
            var text = document.getElementById('btn-signup-text');
            var spinner = document.getElementById('btn-signup-spinner');
            var btn = document.getElementById('btn-signup');
            if (loading) {
                text.textContent = 'Đang xử lý...';
                text.classList.add('opacity-50');
                spinner.classList.remove('hidden');
                btn.disabled = true;
            } else {
                text.textContent = 'Đăng ký';
                text.classList.remove('opacity-50');
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // ============================================
        // Email/Password Signup
        // ============================================
        async function signupWithEmail() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            // Validate
            if (!email || !password || !confirmPassword) {
                showToast('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            setLoading(true);

            try {
                var result = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                });

                setLoading(false);

                if (result.error) {
                    console.error('Signup error:', result.error);
                    if (result.error.message.includes('already registered')) {
                        showToast('Email này đã được đăng ký! Hãy đăng nhập.', 'error');
                    } else if (result.error.message.includes('valid email')) {
                        showToast('Email không hợp lệ!', 'error');
                    } else {
                        showToast('Lỗi: ' + result.error.message, 'error');
                    }
                    return;
                }

                // Check if user already exists (Supabase returns user with empty identities)
                if (result.data && result.data.user && result.data.user.identities && result.data.user.identities.length === 0) {
                    showToast('Email này đã được đăng ký! Hãy đăng nhập.', 'error');
                    return;
                }

                console.log('✅ Signup success:', result.data);
                showToast('🎉 Đăng ký thành công! Kiểm tra email để xác nhận.', 'success');

                // Redirect to login after 2.5 seconds
                setTimeout(function() {
                    window.location.href = '../index.html';
                }, 2500);

            } catch (err) {
                setLoading(false);
                console.error('Unexpected error:', err);
                showToast('Lỗi không xác định! Vui lòng thử lại.', 'error');
            }
        }

        // ============================================
        // Google Signup
        // ============================================
        async function signupWithGoogle() {
            try {
                var result = await _supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard/dashboard.html'
                    }
                });
                if (result.error) {
                    showToast('Lỗi đăng ký Google: ' + result.error.message, 'error');
                }
            } catch (err) {
                console.error('Google signup error:', err);
                showToast('Lỗi kết nối Google!', 'error');
            }
        }

        // ============================================
        // Form Submit Handler (using addEventListener)
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('signup-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('📝 Form submitted');
                    signupWithEmail();
                });
                console.log('✅ Form listener attached');
            } else {
                console.error('❌ Form not found!');
            }

            // Also attach click handler to button as backup
            var btn = document.getElementById('btn-signup');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    // Only handle if form submit didn't fire
                    // This is a backup handler
                    console.log('🔘 Button clicked');
                });
            }
        });
    </script>
</body>
</html>
