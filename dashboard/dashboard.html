<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sanctuary — Kanban Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter'], heading: ['Manrope'] },
                    colors: {
                        border: 'hsl(var(--border))', input: 'hsl(var(--input))', ring: 'hsl(var(--ring))',
                        background: 'hsl(var(--background))', foreground: 'hsl(var(--foreground))',
                        primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
                        secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
                        muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
                        accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
                        destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
                        card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
                    },
                    borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--background:0 0% 98.5%;--foreground:224 71% 4%;--card:0 0% 100%;--card-foreground:224 71% 4%;--primary:239 84% 67%;--primary-foreground:0 0% 100%;--secondary:220 14% 96%;--secondary-foreground:220 9% 46%;--muted:220 14% 96%;--muted-foreground:220 9% 46%;--accent:220 14% 96%;--accent-foreground:224 71% 4%;--destructive:0 72% 51%;--destructive-foreground:0 0% 100%;--border:220 13% 91%;--input:220 13% 91%;--ring:239 84% 67%;--radius:0.75rem}
        .dark{--background:224 71% 4%;--foreground:210 20% 98%;--card:224 47% 7.5%;--card-foreground:210 20% 98%;--primary:239 84% 67%;--primary-foreground:0 0% 100%;--secondary:215 28% 17%;--secondary-foreground:210 20% 98%;--muted:215 28% 17%;--muted-foreground:218 11% 65%;--accent:215 28% 17%;--accent-foreground:210 20% 98%;--destructive:0 63% 31%;--destructive-foreground:210 20% 98%;--border:216 28% 14%;--input:216 28% 14%;--ring:239 84% 67%}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',system-ui,sans-serif;background:transparent;color:hsl(var(--foreground));-webkit-font-smoothing:antialiased}
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
        .gpu{will-change:transform,opacity;transform:translateZ(0);backface-visibility:hidden}
        .task-card{transition:transform 220ms cubic-bezier(.2,1,.3,1),box-shadow 220ms cubic-bezier(.2,1,.3,1);will-change:transform}
        .task-card:hover{transform:translateY(-3px) translateZ(0);box-shadow:0 12px 28px -8px rgba(0,0,0,0.08),0 4px 10px -4px rgba(0,0,0,0.03)}
        .dark .task-card:hover{box-shadow:0 12px 28px -8px rgba(0,0,0,0.4)}
        .task-card.dragging{opacity:.35;transform:rotate(2deg) scale(.96)}
        .drop-active{background:hsl(var(--primary)/0.04);border:2px dashed hsl(var(--primary)/0.25);border-radius:var(--radius)}
        .overlay{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
        .dark .overlay{background:rgba(0,0,0,.65)}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:hsl(var(--muted-foreground)/.15);border-radius:100px}
        ::-webkit-scrollbar-thumb:hover{background:hsl(var(--muted-foreground)/.3)}
        .pulse-ring{width:8px;height:8px;border-radius:50%;background:#22c55e;position:relative}
        .pulse-ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #22c55e;animation:ping 2s cubic-bezier(0,0,.2,1) infinite;opacity:0}
        @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
        .animate-fadeUp{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
        .animate-scaleIn{animation:scaleIn .35s cubic-bezier(.16,1,.3,1) both}
        .stagger>*{animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both}
        .stagger>*:nth-child(1){animation-delay:0ms}.stagger>*:nth-child(2){animation-delay:40ms}
        .stagger>*:nth-child(3){animation-delay:80ms}.stagger>*:nth-child(4){animation-delay:120ms}
        .stagger>*:nth-child(5){animation-delay:160ms}.stagger>*:nth-child(6){animation-delay:200ms}
        .stagger>*:nth-child(7){animation-delay:240ms}.stagger>*:nth-child(8){animation-delay:280ms}
        /* Gradient decorations */
        .bg-grid{background-image:radial-gradient(hsl(var(--foreground)/.04) 1px,transparent 1px);background-size:24px 24px}
        .dark .bg-grid{background-image:radial-gradient(hsl(var(--foreground)/.06) 1px,transparent 1px)}
    </style>
</head>
<body>
<!-- Dynamic 120fps Canvas Background -->

    <canvas id="bg-canvas" class="absolute inset-0 w-full h-full"></canvas>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-background/50 backdrop-blur-[1px]"></div>
</div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const sb = window.supabase.createClient(
    'https://gaattdmfuyxnaofspfvy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhYXR0ZG1mdXl4bmFvZnNwZnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDUxOTYsImV4cCI6MjA5MTg4MTE5Nn0.IOb6H2BofMFr14S-fjV8AANSNef-3zlEwRfenbNES10'

// ── UI Components ──────────────────────────────
function Icon({name,filled,className='',size=20}){
    const s=filled?{fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24"}:{};
    return <span className={`material-symbols-outlined ${className}`} style={{fontSize:size,...s}}>{name}</span>;
}
function Btn({children,v='default',s='md',className='',...p}){
    const vs={default:'bg-primary text-primary-foreground shadow-sm hover:opacity-90',secondary:'bg-secondary text-secondary-foreground hover:bg-secondary/80',
        ghost:'hover:bg-accent',outline:'border border-border hover:bg-accent',destructive:'bg-destructive text-destructive-foreground hover:opacity-90'};
    const ss={sm:'h-8 px-3 text-xs',md:'h-9 px-4 text-sm',lg:'h-11 px-6 text-base',icon:'h-9 w-9 p-0'};
    return <button className={`inline-flex items-center justify-center gap-2 font-semibold rounded-lg transition-all duration-200 active:scale-[.97] disabled:opacity-50 ${vs[v]} ${ss[s]} ${className}`} {...p}>{children}</button>;
}
function Inp({className='',...p}){return <input className={`h-10 w-full rounded-lg border border-input bg-background px-3 text-sm placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/20 focus:border-primary transition-all ${className}`} {...p}/>;}
function Txta({className='',...p}){return <textarea className={`w-full rounded-lg border border-input bg-background px-3 py-2.5 text-sm placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/20 focus:border-primary transition-all resize-none ${className}`} {...p}/>;}
function Sel({className='',children,...p}){return <select className={`h-10 w-full rounded-lg border border-input bg-background px-3 text-sm focus:outline-none focus:ring-2 focus:ring-ring/20 focus:border-primary transition-all ${className}`} {...p}>{children}</select>;}
function Badge({children,v='default',className=''}){
    const c={default:'bg-primary/10 text-primary',high:'bg-red-500/10 text-red-500 dark:text-red-400',medium:'bg-amber-500/10 text-amber-600 dark:text-amber-400',
        low:'bg-sky-500/10 text-sky-600 dark:text-sky-400',done:'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400'};
    return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 text-[10px] font-bold uppercase tracking-widest rounded-full ${c[v]} ${className}`}>{children}</span>;
}

function Toast({message,type,visible}){
    const c={success:'from-emerald-500 to-emerald-600',error:'from-red-500 to-red-600',info:'from-indigo-500 to-indigo-600'};
    const ic={success:'check_circle',error:'error',info:'info'};
    return <div className={`fixed top-5 right-5 z-[9999] flex items-center gap-3 px-5 py-3.5 rounded-2xl text-white text-sm font-semibold shadow-2xl bg-gradient-to-r ${c[type]||c.info} transition-all duration-500 ${visible?'translate-x-0 opacity-100':'translate-x-[130%] opacity-0'}`}
        style={{transitionTimingFunction:'cubic-bezier(.16,1,.3,1)'}}><Icon name={ic[type]||'info'} filled size={18}/>{message}</div>;
}

function Modal({open,onClose,children}){
    if(!open) return null;
    return <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="bg-card text-card-foreground rounded-2xl shadow-2xl w-full max-w-md animate-scaleIn border border-border overflow-hidden" onClick={e=>e.stopPropagation()}>{children}</div></div>;
}

// ── Task Card ──────────────────────────────────
function TaskCard({task,onMove,onDelete,onEdit,onArchive}){
    const[menu,setMenu]=useState(false);
    const ref=useRef(null);
    const done=task.status==='Hoàn thành';
    const pm={high:{v:'high',l:'Cao',dot:'bg-red-500',ring:'ring-red-500/20'},medium:{v:'medium',l:'Trung bình',dot:'bg-amber-500',ring:'ring-amber-500/20'},low:{v:'low',l:'Thấp',dot:'bg-sky-500',ring:'ring-sky-500/20'}};
    const pc=pm[task.priority]||pm.low;
    useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setMenu(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
    const sts=['Cần làm','Đang làm','Hoàn thành'];
    const sIc={'Cần làm':'inventory_2','Đang làm':'play_circle','Hoàn thành':'check_circle'};
    const sCol={'Cần làm':'text-indigo-500','Đang làm':'text-amber-500','Hoàn thành':'text-emerald-500'};
    return(
        <div className={`task-card bg-card border border-border rounded-xl p-4 group relative ${done?'opacity-60':''}`}
            draggable="true" onDragStart={e=>{e.dataTransfer.setData('taskId',task.id);e.currentTarget.classList.add('dragging')}}
            onDragEnd={e=>e.currentTarget.classList.remove('dragging')}>
            {/* Priority stripe */}
            <div className={`absolute top-0 left-0 w-1 h-full rounded-l-xl ${done?'bg-emerald-500':pc.dot}`}></div>
            <div className="pl-2">
                {/* Top row */}
                <div className="flex items-center justify-between mb-2.5">
                    {done?<Badge v="done">✓ Xong</Badge>:<Badge v={pc.v}><span className={`w-1.5 h-1.5 rounded-full ${pc.dot}`}></span>{pc.l}</Badge>}
                    <div className="relative" ref={ref}>
                        <button className="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-accent rounded-lg transition-all duration-200" onClick={()=>setMenu(!menu)}>
                            <Icon name="more_horiz" className="text-muted-foreground" size={16}/></button>
                        {menu&&(
                            <div className="absolute right-0 top-full mt-1 bg-card border border-border rounded-xl shadow-2xl min-w-[200px] p-1.5 z-50 animate-scaleIn">
                                <button className="w-full text-left px-3 py-2 text-[13px] flex items-center gap-2.5 hover:bg-accent rounded-lg transition-colors font-medium"
                                    onClick={()=>{setMenu(false);onEdit(task)}}><Icon name="edit" className="text-indigo-500" size={16}/>Chỉnh sửa</button>
                                <div className="h-px bg-border my-1"></div>
                                {sts.filter(s=>s!==task.status).map(s=>(
                                    <button key={s} className="w-full text-left px-3 py-2 text-[13px] flex items-center gap-2.5 hover:bg-accent rounded-lg transition-colors font-medium"
                                        onClick={()=>{setMenu(false);onMove(task.id,s)}}><Icon name={sIc[s]} className={sCol[s]} size={16}/>→ {s}</button>))}
                                <div className="h-px bg-border my-1"></div>
                                <button className="w-full text-left px-3 py-2 text-[13px] flex items-center gap-2.5 hover:bg-accent rounded-lg transition-colors font-medium text-violet-600 dark:text-violet-400"
                                    onClick={()=>{setMenu(false);onArchive(task.id)}}><Icon name="inventory_2" size={16}/>Đưa vào lưu trữ</button>
                                <div className="h-px bg-border my-1"></div>
                                <button className="w-full text-left px-3 py-2 text-[13px] flex items-center gap-2.5 text-destructive hover:bg-destructive/5 rounded-lg transition-colors font-medium"
                                    onClick={()=>{setMenu(false);onDelete(task.id)}}><Icon name="delete_outline" size={16}/>Xóa</button>
                            </div>)}
                    </div>
                </div>
                {/* Title & Desc */}
                <h4 className={`font-semibold text-[14px] leading-snug mb-1 ${done?'line-through opacity-50':''}`}>{task.title}</h4>
                {task.description&&<p className="text-muted-foreground text-[12px] leading-relaxed mb-2 line-clamp-2">{task.description}</p>}
                {/* Date */}
                <div className="flex items-center gap-1.5 text-muted-foreground mt-2 pt-2.5 border-t border-border/50">
                    <Icon name={done?'done_all':'schedule'} size={13}/><span className="text-[11px] font-medium">{fmtDate(task.created_at)}</span>
                </div>
            </div>
        </div>);
}

// ── Column ─────────────────────────────────────
function Column({title,color,bg,countBg,count,tasks,onMove,onDelete,onEdit,onArchive,status}){
    const[dragOver,setDragOver]=useState(false);
    return(
        <div className="flex-shrink-0 w-full lg:flex-1 lg:min-w-[300px]">
            <div className="bg-card/50 dark:bg-card/80 backdrop-blur-sm rounded-2xl border border-border/50 overflow-visible transition-all duration-300">
                {/* Column header */}
                <div className="flex items-center justify-between px-5 py-4 border-b border-border/30">
                    <div className="flex items-center gap-2.5">
                        <div className="w-2.5 h-2.5 rounded-full" style={{background:color}}></div>
                        <h3 className="font-heading font-bold text-foreground text-[14px]">{title}</h3>
                    </div>
                    <span className={`${countBg} min-w-[28px] text-center px-2 py-0.5 rounded-full text-[11px] font-bold`}>{count}</span>
                </div>
                {/* Tasks */}
                <div className={`flex flex-col gap-2.5 p-3 min-h-[200px] transition-all duration-200 ${dragOver?'drop-active':''}`}
                    onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
                    onDrop={e=>{e.preventDefault();setDragOver(false);const id=e.dataTransfer.getData('taskId');if(id) onMove(id,status)}}>
                    {tasks.length===0?(
                        <div className="flex flex-col items-center justify-center py-12 gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-muted flex items-center justify-center"><Icon name="inbox" size={24} className="text-muted-foreground/50"/></div>
                            <p className="text-[12px] text-muted-foreground/60 font-medium">Chưa có nhiệm vụ</p>
                        </div>
                    ):(<div className="stagger">{tasks.map(t=><TaskCard key={t.id} task={t} onMove={onMove} onDelete={onDelete} onEdit={onEdit} onArchive={onArchive}/>)}</div>)}
                </div>
            </div>
        </div>);
}

// ── Stat Card ──────────────────────────────────
function Stat({label,count,icon,color,gradFrom,gradTo}){
    return(
        <div className="bg-card border border-border rounded-2xl p-5 relative overflow-hidden group hover:shadow-lg transition-all duration-300">
            <div className="absolute top-0 left-0 right-0 h-[3px] opacity-80" style={{background:`linear-gradient(90deg,${gradFrom},${gradTo})`}}></div>
            <div className="flex items-center justify-between relative z-10">
                <div>
                    <p className="text-[11px] font-bold text-muted-foreground uppercase tracking-[.1em] mb-1">{label}</p>
                    <p className="text-3xl font-heading font-extrabold tabular-nums">{count}</p>
                </div>
                <div className="w-12 h-12 rounded-2xl flex items-center justify-center transition-transform duration-300 group-hover:scale-110"
                    style={{background:`linear-gradient(135deg,${gradFrom}15,${gradTo}15)`}}>
                    <Icon name={icon} size={24} style={{color}}/>
                </div>
            </div>
            {/* Subtle bg effect */}
            <div className="absolute -bottom-6 -right-6 w-24 h-24 rounded-full opacity-[0.03]" style={{background:color}}></div>
        </div>);
}

// ── Main App ───────────────────────────────────
function App(){
    const[user,setUser]=useState(null);
    const[tasks,setTasks]=useState([]);
    const[loading,setLoading]=useState(true);
    const[modal,setModal]=useState(false);
    const[search,setSearch]=useState('');
    const[filter,setFilter]=useState('all');
    const[toast,setToast]=useState({message:'',type:'info',visible:false});
    const[dark,setDark]=useState(()=>localStorage.getItem('theme')==='dark');
    const[form,setForm]=useState({title:'',description:'',status:'Cần làm',priority:'medium'});
    const[busy,setBusy]=useState(false);
    const[editTask,setEditTask]=useState(null);
    const[editForm,setEditForm]=useState({title:'',description:'',status:'',priority:''});
    const[editBusy,setEditBusy]=useState(false);
    const[view,setView]=useState('overview');

    useEffect(()=>{document.documentElement.classList.toggle('dark',dark);localStorage.setItem('theme',dark?'dark':'light')},[dark]);
    const notify=useCallback((m,t='info')=>{setToast({message:m,type:t,visible:true});setTimeout(()=>setToast(p=>({...p,visible:false})),3000)},[]);

    useEffect(()=>{(async()=>{
        const{data:{user}}=await sb.auth.getUser();
        if(!user){window.location.href='../index.html';return}
        setUser(user);await load(user.id);setLoading(false);
        sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'tasks',filter:`user_id=eq.${user.id}`},()=>load(user.id)).subscribe();
    })()},[]);

    const load=async(uid)=>{const id=uid||user?.id;if(!id)return;const{data,error}=await sb.from('tasks').select('*').eq('user_id',id).order('created_at',{ascending:false});if(!error)setTasks(data||[])};

    const isArchived=t=>!!(t.title&&t.title.startsWith('[Lưu trữ] '));
    const activeTasks=tasks.filter(t=>!isArchived(t));
    const archivedTasks=tasks.filter(t=>isArchived(t));

    const filtered=activeTasks.filter(t=>{
        if(filter!=='all'&&t.priority!==filter)return false;
        if(search){const q=search.toLowerCase();return(t.title||'').toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q)}
        return true;
    });
    const todo=filtered.filter(t=>t.status==='Cần làm'),prog=filtered.filter(t=>t.status==='Đang làm'),done=filtered.filter(t=>t.status==='Hoàn thành');

    const handleAdd=async e=>{
        e.preventDefault();if(!form.title.trim()){notify('Nhập tiêu đề!','error');return}
        setBusy(true);
        const{error}=await sb.from('tasks').insert([{title:form.title.trim(),description:form.description.trim()||null,status:form.status,priority:form.priority,user_id:user.id}]);
        setBusy(false);
        if(error){notify('Lỗi: '+error.message,'error');return}
        notify('🎉 Tạo thành công!','success');setModal(false);setForm({title:'',description:'',status:'Cần làm',priority:'medium'});await load();
    };
    const handleMove=async(id,s)=>{const{error}=await sb.from('tasks').update({status:s}).eq('id',id);if(error){notify('Lỗi!','error');return}notify(`→ ${s}`,'info');await load()};
    const handleDelete=async id=>{if(!confirm('Xóa?'))return;const{error}=await sb.from('tasks').delete().eq('id',id);if(error){notify('Lỗi!','error');return}notify('🗑️ Đã xóa','success');await load()};
    const handleEditOpen=t=>{setEditTask(t);setEditForm({title:t.title,description:t.description||'',status:t.status,priority:t.priority})};
    const handleEditSubmit=async e=>{e.preventDefault();if(!editForm.title.trim()){notify('Nhập tiêu đề!','error');return}
        setEditBusy(true);const{error}=await sb.from('tasks').update({title:editForm.title.trim(),description:editForm.description.trim()||null,status:editForm.status,priority:editForm.priority}).eq('id',editTask.id);
        setEditBusy(false);if(error){notify('Lỗi: '+error.message,'error');return}notify('✏️ Đã cập nhật!','success');setEditTask(null);await load()};
    const handleArchive=async id=>{const t=tasks.find(x=>x.id===id);if(!t)return;const{error}=await sb.from('tasks').update({title:'[Lưu trữ] '+t.title}).eq('id',id);if(error){notify('Lỗi!','error');return}notify('🗄️ Đã lưu trữ','success');await load()};
    const handleUnarchive=async id=>{const t=tasks.find(x=>x.id===id);if(!t)return;const newTitle=t.title.replace(/^\[Lưu trữ\] /,'');const{error}=await sb.from('tasks').update({title:newTitle}).eq('id',id);if(error){notify('Lỗi!','error');return}notify('↩️ Đã khôi phục','success');await load()};
    const logout=async()=>{await sb.auth.signOut();window.location.href='../index.html'};

    if(loading) return <div className="min-h-screen flex items-center justify-center bg-background"><div className="flex flex-col items-center gap-4 animate-fadeUp">
        <div className="w-10 h-10 border-[3px] border-primary/20 border-t-primary rounded-full animate-spin"></div><p className="text-muted-foreground text-sm">Đang tải...</p></div></div>;

                    <th className="text-left px-5 py-3 font-bold text-[11px] uppercase tracking-wider text-muted-foreground hidden sm:table-cell">Trạng thái</th>
                    <th className="text-left px-5 py-3 font-bold text-[11px] uppercase tracking-wider text-muted-foreground hidden sm:table-cell">Ưu tiên</th>

                    <th className="px-5 py-3"></th></tr></thead>
                <tbody>{tasks.length===0?<tr><td colSpan={5} className="text-center py-12 text-muted-foreground">Chưa có nhiệm vụ nào</td></tr>:
                    tasks.map(t=>{const pr={high:'🔴 Cao',medium:'🟡 TB',low:'🟢 Thấp'};const sc={' Cần làm':'text-indigo-500','Đang làm':'text-amber-500','Hoàn thành':'text-emerald-500'};

                            <Btn v="ghost" s="icon" onClick={()=>handleDelete(t.id)}><Icon name="delete" size={15} className="text-destructive"/></Btn>

            </div>
        </div>);

    // ── View: Dự án (Group by priority) ──
    const ProjectsView=()=>(
        <div className="animate-fadeUp">
            <h2 className="text-2xl font-heading font-extrabold mb-6">📁 Dự án</h2>

                        <div className="flex items-center justify-between px-5 py-4 border-b border-border/30">
                            <h3 className="font-heading font-bold text-[14px]">{g.title}</h3>
                            <span className="bg-muted px-2.5 py-0.5 rounded-full text-[11px] font-bold text-muted-foreground">{g.tasks.length}</span>

                        <div className="p-4 space-y-2">{g.tasks.length===0?<p className="text-center py-6 text-muted-foreground text-sm">Trống</p>:
                            g.tasks.map(t=>(<div key={t.id} className="flex items-center justify-between p-3 bg-background rounded-xl hover:bg-accent/30 transition-colors">
                                <div className="flex-1 min-w-0"><p className="font-medium text-sm truncate">{t.title}</p>

    const ArchiveView=()=>{
        return(<div className="animate-fadeUp">

                    <div className="flex items-center gap-3 flex-1 min-w-0">
                        <div className="w-8 h-8 rounded-lg bg-violet-500/10 flex items-center justify-center flex-shrink-0">

                        <div className="min-w-0"><p className="font-medium text-sm truncate">{cleanTitle}</p>
                            <p className="text-xs text-muted-foreground">{t.status} · {fmtDate(t.created_at)}</p></div>

                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">

                        <Btn v="ghost" s="icon" onClick={()=>handleDelete(t.id)}><Icon name="delete" size={15} className="text-destructive"/></Btn>

                </div>)})}</div>}
        </div>)};

                        <div className="relative w-28 h-28 flex-shrink-0">
                            <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
                                <circle cx="18" cy="18" r="15.5" fill="none" stroke="hsl(var(--muted))" strokeWidth="3"/>
                                <circle cx="18" cy="18" r="15.5" fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round"
                                    strokeDasharray={`${pct} ${100-pct}`}/>
                            </svg>
                            <div className="absolute inset-0 flex items-center justify-center"><span className="text-2xl font-heading font-extrabold">{pct}%</span></div>
                        </div>
                        <div className="space-y-2"><p className="text-sm text-muted-foreground">{doneT}/{totalT} nhiệm vụ</p>
                            <p className="text-xs text-muted-foreground">đã hoàn thành</p></div>
                    </div>
                </div>
                {/* Bar chart */}
                <div className="bg-card border border-border rounded-2xl p-6">
                    <h3 className="font-heading font-bold text-sm mb-4">Phân bổ trạng thái</h3>
                    <div className="space-y-4">{bars.map(b=>(
                        <div key={b.label}><div className="flex justify-between text-xs mb-1.5"><span className="font-medium">{b.label}</span><span className="font-bold">{b.count}</span></div>
                            <div className="h-3 bg-muted rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-700" style={{width:`${(b.count/maxB)*100}%`,background:b.color}}/></div>

                {/* Priority breakdown */}
                <div className="bg-card border border-border rounded-2xl p-6 md:col-span-2">
                    <h3 className="font-heading font-bold text-sm mb-4">Phân bổ ưu tiên</h3>
                    <div className="grid grid-cols-3 gap-4">{[{l:'Cao',c:pHigh.length,cl:'from-red-500 to-rose-500'},{l:'Trung bình',c:pMed.length,cl:'from-amber-500 to-yellow-500'},{l:'Thấp',c:pLow.length,cl:'from-sky-500 to-cyan-500'}].map(p=>(
                        <div key={p.l} className="text-center p-4 rounded-xl bg-muted/30">
                            <p className="text-3xl font-heading font-extrabold mb-1">{p.c}</p>
                            <p className="text-xs font-medium text-muted-foreground">{p.l}</p>

                    <div className="flex items-center gap-4 mb-4">
                        <div className="w-14 h-14 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-full flex items-center justify-center ring-4 ring-background shadow-lg">
                            <span className="text-white font-bold text-xl">{initial}</span></div>
                        <div><p className="font-semibold">{user?.email}</p><p className="text-sm text-muted-foreground">Free plan</p></div>
                    </div>
                </div>
                {/* Theme */}

        </div>);

                <h3 className="text-lg font-heading font-bold">Chỉnh sửa</h3>
                <div className="flex-1"></div><Btn v="ghost" s="icon" onClick={()=>setEditTask(null)}><Icon name="close" size={18} className="text-muted-foreground"/></Btn>
            </div></div>
            <form onSubmit={handleEditSubmit} className="p-6 pt-3 space-y-4">

            </form>
        </Modal>

        {/* ── Add Modal ── */}

            <div className="p-6 pb-2"><div className="flex items-center gap-3 mb-1">

                <h3 className="text-lg font-heading font-bold">Thêm Nhiệm vụ</h3>

            </div></div>
            <form onSubmit={handleAdd} className="p-6 pt-3 space-y-4">

                    <Icon name="view_kanban" className="text-white" size={18}/></div>
                <div><p className="font-heading font-bold text-[15px] leading-tight">Sanctuary</p>
                    <p className="text-[10px] text-muted-foreground font-medium tracking-wider uppercase">Workspace</p></div>

            {view==='archive'?<ArchiveView/>:
             view==='stats'?<StatsView/>:
             view==='settings'?<SettingsView/>:
            <>{/* Overview (default) */}

                <div>
                    <h2 className="text-2xl md:text-[32px] font-heading font-extrabold tracking-tight leading-tight">

                    <p className="text-muted-foreground mt-1.5 text-[13px]">Tối ưu hiệu quả công việc qua giao diện Kanban trực quan.</p>

            </div>
            </>}
        </main>

<script>
    // ============================================
    // 120FPS Network Particle Background
    // ============================================
    (function() {
        const canvas = document.getElementById('bg-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d', { alpha: true });
        let width, height;
        let particles = [];
        const connectionDistance = 200;
        const mouse = { x: null, y: null, radius: 250 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.baseRadius = Math.random() * 2 + 1;
                this.radius = this.baseRadius;
            }

            update() {
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                this.x += this.vx;
                this.y += this.vy;

                if (mouse.x != null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 1;
                        this.y -= (dy / distance) * force * 1;
                        this.radius = this.baseRadius + (force * 2);
                    } else {
                        this.radius = this.baseRadius;
                    }
                } else {
                    this.radius = this.baseRadius;
                }
            }

            draw() {
                const isDark = document.documentElement.classList.contains('dark');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = isDark ? 'rgba(99, 102, 241, 0.5)' : 'rgba(99, 102, 241, 0.4)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(Math.floor((width * height) / 12000), 100);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        initParticles();

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(initParticles, 200);
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const isDark = document.documentElement.classList.contains('dark');
            const strokeBase = '99, 102, 241'; // primary color (indigo)

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        const opacity = (1 - (dist / connectionDistance)) * (isDark ? 0.3 : 0.2);
                        ctx.strokeStyle = `rgba(${strokeBase}, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    })();
</script>
